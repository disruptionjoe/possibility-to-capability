strategic_reprioritization:
  date: '2026-07-22'
  authority: >-
    Coordinator update under Joe's standing authorization (direct chat, 2026-07-22) to revise research-repo
    canon (within-lane priorities only) with an awareness note. The governance/CHARTER.md
    Purpose/Passion/Practice and the constitutional AGENTS.md are UNCHANGED. This is a CHARTER-REALIGNMENT:
    P2C's Lane 1 had DRIFTED into hunting a physical source-grounded transition, which contradicts P2C's own
    charter ('physics is not the scope; the same typed definitions must transfer beyond physics'). Awareness
    note filed to system-attention (tri-repo).
  finding: >-
    Wave-1 triple-diamond prep (2026-07-22) found P2C's Lane-1 object, TI's, and TaF's are ONE object seen
    through three absorbers -- a process whose next step is provably NOT a fixed function of its recorded past
    (P2C's face = static-representability / the thin-shadow absorber). Dynamic Unity converges on the same
    object and is the only sibling constitutionally allowed to COMBINE the legs; P2C is by charter FORBIDDEN
    from combining partial results, so it structurally cannot own the assembly. All three tri-repo Lane-1s
    were simultaneously stalled on the same source packet.
  moves:
  - "(1) DEMOTE the drifted 'hunt a physical source-grounded transition with exact Hamiltonian role' as the
    top Lane-1 HEADLINE -- it contradicts P2C's own charter. The dynamical-transition witness (P2C-2) stays a
    bounded own-absorber CHECK contributing the thin-shadow / no-static-representative leg to Dynamic Unity;
    MIPT was removed as a witness family (2026-07-22 pre-kill = ACCESS_CHANGE_ONLY); the TFIM-quench DQPT and
    matched-drive anomalous-Floquet specimens remain the check's swings."
  - "(2) PROMOTE the cross-domain transfer battery + methodology (P2C-3) as top Lane-1 -- REALIGNING with
    P2C's charter (typed definitions must transfer beyond physics). The methodology genre-gate returned
    NEW-FRAMING-ONLY (2026-07-22); the security-first transfer-BREAKER (P2C-XBREAK-001) is the cheapest next
    falsification. This is P2C's distinctive world-useful contribution and DU does not pursue it."
  - "(3) P2C is a re-verified SUPPLIER of the capability/transition (thin-shadow) leg to Dynamic Unity (the
    integrator). The sigma Door-4 adjudication frame (P2C-1) stays a native criterion whose verdict is
    GU-gated (NOT_YET_IMPORTABLE) and is capped at forcing-the-distinction-not-selection -- a leased
    contribution, not a stalled headline. Generalizes the GU sigma=w1 supplier model."
  robustness: >-
    Robust to the 'one object, three faces' identity being unproven: if it holds, DU owns the assembly and P2C
    feeds it; if it is false, P2C's cross-domain transfer question is a genuinely distinct native result on its
    own terms. Either way P2C stops circling a shared source and returns to its own charter. A fresh steward
    re-rank under this reprioritization is due on the next cycle.
